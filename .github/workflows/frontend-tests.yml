name: Frontend Tests

on:
  pull_request:
    branches: [master, dev]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [master, dev]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check if frontend files changed
        id: frontend-changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'

      - name: Set up Node.js
        if: steps.frontend-changes.outputs.frontend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        if: steps.frontend-changes.outputs.frontend == 'true'
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Cache dependencies
        if: steps.frontend-changes.outputs.frontend == 'true'
        uses: actions/cache@v5
        with:
          path: |
            ~/.pnpm-store
            frontend/node_modules
          key: frontend-deps-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            frontend-deps-

      - name: Install dependencies
        if: steps.frontend-changes.outputs.frontend == 'true'
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Run linting
        if: steps.frontend-changes.outputs.frontend == 'true'
        working-directory: frontend
        run: pnpm run lint

      - name: Run format check
        if: steps.frontend-changes.outputs.frontend == 'true'
        working-directory: frontend
        run: pnpm run format

  build:
    name: Build
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check if frontend files changed
        id: frontend-changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'

      - name: Set up Node.js
        if: steps.frontend-changes.outputs.frontend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        if: steps.frontend-changes.outputs.frontend == 'true'
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Cache dependencies
        if: steps.frontend-changes.outputs.frontend == 'true'
        uses: actions/cache@v5
        with:
          path: |
            ~/.pnpm-store
            frontend/node_modules
          key: frontend-deps-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            frontend-deps-

      - name: Cache Next.js build
        if: steps.frontend-changes.outputs.frontend == 'true'
        uses: actions/cache@v5
        with:
          path: frontend/.next
          key: nextjs-build-${{ hashFiles('frontend/**/*.{js,jsx,ts,tsx}') }}
          restore-keys: |
            nextjs-build-

      - name: Install dependencies
        if: steps.frontend-changes.outputs.frontend == 'true'
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build project
        if: steps.frontend-changes.outputs.frontend == 'true'
        working-directory: frontend
        run: pnpm run build

  test-gate:
    name: Test Gate
    runs-on: ubuntu-latest
    needs: [lint, build]
    if: always()

    steps:
      - name: Check all test jobs
        run: |
          if [[ "${{ needs.lint.result }}" == "failure" ||
                "${{ needs.build.result }}" == "failure" ]]; then
            echo "Frontend tests failed"
            exit 1
          else
            echo "All frontend tests passed"
          fi
