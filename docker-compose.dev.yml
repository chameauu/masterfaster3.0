version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: surfsense-postgres
    environment:
      POSTGRES_USER: surfsense
      POSTGRES_PASSWORD: surfsense
      POSTGRES_DB: surfsense
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U surfsense -d surfsense"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: surfsense-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
